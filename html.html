<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Match Outcome Predictor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .page-title i { font-size: 22px; color: #888780; }
    .page-title span { font-size: 18px; font-weight: 500; }

    .subtitle {
      font-size: 13px;
      color: #5f5e5a;
      margin-bottom: 1.25rem;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .score-side { display: flex; flex-direction: column; }
    .score-side.right { align-items: flex-end; }

    .score-label {
      font-size: 12px;
      color: #5f5e5a;
      margin-bottom: 6px;
    }

    .score-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #f5f5f3;
      color: #1a1a18;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .score-btn:hover { background: #e8e8e5; }
    .score-btn:active { transform: scale(0.96); }

    .score-val {
      font-size: 28px;
      font-weight: 500;
      min-width: 28px;
      text-align: center;
    }

    .team-name {
      font-size: 11px;
      color: #888780;
      margin-top: 6px;
    }

    .vs { font-size: 22px; font-weight: 500; color: #b4b2a9; text-align: center; }

    .predict-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.18);
      background: #f5f5f3;
      color: #1a1a18;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .predict-btn:hover { background: #e8e8e5; }
    .predict-btn:active { transform: scale(0.98); }

    .result-card { display: none; }

    .result-section-label {
      font-size: 12px;
      color: #888780;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .result-outcome {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .result-outcome i { font-size: 20px; }
    .result-outcome span { font-size: 20px; font-weight: 500; }

    .bars-label {
      font-size: 12px;
      color: #5f5e5a;
      margin-bottom: 0.75rem;
    }

    .bar-group { display: flex; flex-direction: column; gap: 10px; }

    .bar-row { display: flex; flex-direction: column; gap: 4px; }

    .bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #1a1a18;
    }

    .bar-header span:last-child { font-weight: 500; }

    .bar-track {
      height: 6px;
      background: #f1efe8;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .disclaimer {
      font-size: 11px;
      color: #888780;
      margin-top: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }

    .disclaimer i { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="page-title">
    <i class="ti ti-ball-football" aria-hidden="true"></i>
    <span>Match outcome predictor</span>
  </div>

  <div class="card">
    <p class="subtitle">Enter the score to predict the match outcome using the trained Random Forest model.</p>

    <div class="score-grid">
      <div class="score-side">
        <label class="score-label">Home goals</label>
        <div class="score-controls">
          <button class="score-btn" onclick="adj('home',-1)" aria-label="decrease home score"><i class="ti ti-minus" aria-hidden="true"></i></button>
          <span class="score-val" id="home-val">2</span>
          <button class="score-btn" onclick="adj('home',1)" aria-label="increase home score"><i class="ti ti-plus" aria-hidden="true"></i></button>
        </div>
        <p class="team-name">Home team</p>
      </div>

      <span class="vs">–</span>

      <div class="score-side right">
        <label class="score-label" style="text-align:right;">Away goals</label>
        <div class="score-controls">
          <button class="score-btn" onclick="adj('away',-1)" aria-label="decrease away score"><i class="ti ti-minus" aria-hidden="true"></i></button>
          <span class="score-val" id="away-val">1</span>
          <button class="score-btn" onclick="adj('away',1)" aria-label="increase away score"><i class="ti ti-plus" aria-hidden="true"></i></button>
        </div>
        <p class="team-name" style="text-align:right;">Away team</p>
      </div>
    </div>

    <button class="predict-btn" onclick="predict()">
      <i class="ti ti-player-play" aria-hidden="true"></i> Predict outcome
    </button>
  </div>

  <div class="card result-card" id="result-card">
    <p class="result-section-label">Prediction</p>

    <div class="result-outcome">
      <i id="result-icon" class="ti ti-trophy" aria-hidden="true"></i>
      <span id="result-label">Home Win</span>
    </div>

    <p class="bars-label">Confidence breakdown</p>

    <div class="bar-group">
      <div class="bar-row">
        <div class="bar-header"><span>Home win</span><span id="p0">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar0" style="background:#378ADD;"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-header"><span>Away win</span><span id="p1">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar1" style="background:#D85A30;"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-header"><span>Draw</span><span id="p2">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar2" style="background:#1D9E75;"></div></div>
      </div>
    </div>

    <p class="disclaimer">
      <i class="ti ti-info-circle" aria-hidden="true"></i>
      Real prediction from your trained Random Forest model via Colab.
    </p>
  </div>
  <div id="error-msg" style="display:none; background:#FCEBEB; border:0.5px solid #F09595; border-radius:12px; padding:1rem 1.25rem; align-items:flex-start; gap:8px;">
    <i class="ti ti-alert-circle" style="color:#A32D2D; font-size:16px; flex-shrink:0; margin-top:2px;" aria-hidden="true"></i>
    <span style="font-size:13px; color:#A32D2D;"></span>
  </div>

</div>

<script>
  let home = 2, away = 1;

  function adj(side, delta) {
    if (side === 'home') {
      home = Math.max(0, Math.min(20, home + delta));
      document.getElementById('home-val').textContent = home;
    } else {
      away = Math.max(0, Math.min(20, away + delta));
      document.getElementById('away-val').textContent = away;
    }
    document.getElementById('result-card').style.display = 'none';
  }

  const API_URL = "https://zit-crudely-gallantly.ngrok-free.dev/predict"; // ← paste your ngrok URL here

  function showResult(probs) {
    const labels = ['Home win', 'Away win', 'Draw'];
    const icons  = ['ti-home', 'ti-plane', 'ti-equal'];
    const colors = ['#378ADD', '#D85A30', '#1D9E75'];
    const maxIdx = probs.indexOf(Math.max(...probs));

    document.getElementById('result-label').textContent = labels[maxIdx];
    const icon = document.getElementById('result-icon');
    icon.className = 'ti ' + icons[maxIdx];
    icon.style.color = colors[maxIdx];

    for (let i = 0; i < 3; i++) {
      const pct = Math.round(probs[i] * 100);
      document.getElementById('p' + i).textContent = pct + '%';
      document.getElementById('bar' + i).style.width = pct + '%';
    }

    document.getElementById('result-card').style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  async function predict() {
    const btn = document.querySelector('.predict-btn');
    btn.textContent = 'Predicting...';
    btn.disabled = true;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ home_score: home, away_score: away })
      });

      if (!res.ok) throw new Error('Server error: ' + res.status);

      const data = await res.json();
      const probs = [
        data.probabilities.home_win,
        data.probabilities.away_win,
        data.probabilities.draw
      ];
      showResult(probs);

    } catch (err) {
      document.getElementById('error-msg').style.display = 'flex';
      document.getElementById('error-msg').querySelector('span').textContent =
        'Could not reach the model. Make sure your Colab is running and the URL is correct.';
    } finally {
      btn.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Predict outcome';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
